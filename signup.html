<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - એકાઉન્ટ બનાવો</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; }
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-radius; border: 1px solid #ccc; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h2>Sign Up</h2>
    <input type="email" id="email" placeholder="ઇમેઇલ આઇડી">
    <input type="password" id="password" placeholder="પાસવર્ડ (ઓછામાં ઓછા 6 અક્ષર)">
    <button onclick="signUpUser()">Create Account</button>
    <p>Account Already? <a href="login.html">log In</a></p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
  // ⚠️ સ્ટેપ ૧ માંથી મળેલો તમારો Firebase કોડ અહીં પેસ્ટ કરો
  const firebaseConfig = {
    apiKey:"AIzaSyBpebYhcGHdgthrLN7IGkT4LIu4QL0zZJA",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "AIzaSyBpebYhcGHdgthrLN7IGkT4LIu4QL0zZJA",
  };
  firebase.initializeApp(firebaseConfig);

  function signUpUser() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      firebase.auth().createUserWithEmailAndPassword(email, password)
      .then((userCredential) => {
          alert("Account Created Successfully!");
          window.location.href = "login.html"; // લોગીન પેજ પર મોકલો
      })
      .catch((error) => {
          alert("Error: " + error.message);
      });
  }
</script>
</body>
</html>
