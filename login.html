<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <title>Login - લોગીન કરો</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; }
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-radius; border: 1px solid #ccc; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h2>લોગીન (Login)</h2>
    <input type="email" id="email" placeholder="ઇમેઇલ આઇડી">
    <input type="password" id="password" placeholder="પાસવર્ડ">
    <button onclick="loginUser()">લોગીન કરો</button>
    <p>નવું એકાઉન્ટ બનાવવું છે? <a href="signup.html">અહીં ક્લિક કરો</a></p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
  // ⚠️ તમારો Firebase કોડ અહીં પણ પેસ્ટ કરો
  const firebaseConfig = {
    apiKey: "AIzaSyBpebYhcGHdgthrLN7IGkT4LIu4QL0zZJA",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "AIzaSyBpebYhcGHdgthrLN7IGkT4LIu4QL0zZJA",
  };
  firebase.initializeApp(firebaseConfig);

  function loginUser() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      firebase.auth().signInWithEmailAndPassword(email, password)
      .then((userCredential) => {
          // લોગીન સફળ થાય એટલે મુખ્ય પેજ પર મોકલી આપો
          window.location.href = "index.html"; 
      })
      .catch((error) => {
          alert("લોગીન નિષ્ફળ: " + error.message);
      });
  }
</script>
</body>
</html>
